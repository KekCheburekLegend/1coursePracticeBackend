name: API CI/CD

on:
  push:
    branches:
      - "*"
  pull_request:
      branches:
        - "main"


jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Скачиваем код репозитория
        uses: actions/checkout@v4

      - name: Устанавливаем питон
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
          cache-dependency-path: 'requrements.txt'

      - name: устанока зависимостей 
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
